services:
  - type: web
    name: mechanic-finder-backend
    runtime: node
    plan: free
    rootDir: backend
    buildCommand: npm install
    startCommand: npm start
    healthCheckPath: /api/health
    envVars:
      - key: NODE_VERSION
        value: 20
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 5000
      - key: DB_NAME
        value: findmech
      - key: MONGODB_URI
        sync: false
      - key: JWT_SECRET
        generateValue: true
      - key: CORS_ORIGIN
        value: https://mechanic-finder-frontend.onrender.com
      - key: FRONTEND_URL
        value: https://mechanic-finder-frontend.onrender.com
      - key: EMAIL_SERVICE
        value: gmail
      - key: EMAIL_USER
        sync: false
      - key: EMAIL_PASSWORD
        sync: false
      - key: SMTP_HOST
        value: smtp.gmail.com
      - key: SMTP_PORT
        value: 587
      - key: SMTP_SECURE
        value: false
      - key: CLOUDINARY_URL
        sync: false

  - type: static
    name: mechanic-finder-frontend
    plan: free
    rootDir: frontend
    buildCommand: npm install && npm run build
    staticPublishPath: build
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    envVars:
      - key: REACT_APP_API_URL
        value: https://mechanic-finder-backend.onrender.com/api
      - key: REACT_APP_SOCKET_URL
        value: https://mechanic-finder-backend.onrender.com
